---

- name: Create a virtual machine for DBLab Engine
  ansible.builtin.import_playbook: cloud_resources.yml
  when: provision | lower != 'none'
  tags: aws, gcp, azure, digitalocean, hetzner

- name: Deploy and configure DBLab Engine software
  ansible.builtin.import_playbook: software.yml
  tags: dblab, dblab_engine

# add the path to the temporary ssh key if it is used
- name: Set facts for dle_group
  hosts: dle_group
  gather_facts: false
  tasks:
    - name: "Set fact: ansible_ssh_private_key_file"
      ansible.builtin.set_fact:
        ansible_ssh_private_key_file: "~{{ lookup('env', 'USER') }}/.ssh/dle_key_tmp"
      tags: always
      when:
        - hostvars['localhost']['ssh_key_name'] is defined
        - hostvars['localhost']['ssh_key_name'] == 'dle_key_tmp'

- name: Deploy DLE
  hosts: dle_group
  become: true
  become_method: sudo
  gather_facts: true
  any_errors_fatal: true
  vars_files:
    - vars/main.yml
  environment: "{{ proxy_env | default({}) }}"

  pre_tasks:
    - name: Checking Linux distribution
      ansible.builtin.fail:
        msg: "{{ ansible_distribution }} is not supported"
      when: ansible_distribution not in os_valid_distributions
      tags: always

    - name: Checking version of OS Linux
      ansible.builtin.fail:
        msg: "{{ ansible_distribution_version }} of {{ ansible_distribution }} is not supported"
      when: ansible_distribution_version is version_compare(os_minimum_versions[ansible_distribution], '<')
      tags: always

    - name: Include OS-specific variables
      ansible.builtin.include_vars: "vars/{{ ansible_os_family }}.yml"
      tags: always

    - name: Include Supabase variables
      ansible.builtin.include_vars: vars/supabase.yml
      when: supabase_components | bool
      tags: always

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      register: apt_status
      until: apt_status is success
      delay: 10
      retries: 3
      when: ansible_os_family == "Debian"

    - name: Make sure the gnupg and apt-transport-https packages are present
      ansible.builtin.apt:
        pkg:
          - gnupg
          - apt-transport-https
        state: present
      register: apt_status
      until: apt_status is success
      delay: 10
      retries: 3
      when: ansible_os_family == "Debian"

  roles:
    # Prepare system
    - role: authorized-keys
    - role: add-repository
    - role: packages
    - role: zpool

    # Configure and start DBLab Engine
    - role: dblab-engine
    - role: dblab-cli

    # Proxy server
    - role: proxy

    # Monitoring
    - role: netdata

    # Supabase
    - role: supabase
      when: supabase_components | bool

    # finish (connection info)
    - role: deploy-finish
...
