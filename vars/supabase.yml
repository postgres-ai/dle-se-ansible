---
# Supabase variables (if 'supabase_components' is 'true')

# Supabase Runner - https://gitlab.com/postgres-ai/dblab-supabase-runner
supabase_components: false # Set "true" to configure 'dblab-supabase-runner'

supabase_runner_version: 0.4
supabase_runner_image: "registry.gitlab.com/postgres-ai/dblab-supabase-runner:v{{ supabase_runner_version }}"
supabase_runner_port: 8080
supabase_runner_url: "http://dblab_supabase_runner:{{ supabase_runner_port }}"
supabase_runner_token: "secret-token"
supabase_runner_network: "dblab_supabase_network"
supabase_runner_config_path: "{{ dblab_engine_base_path }}/supabase"
supabase_runner_env_file: "{{ supabase_runner_config_path }}/env"
# Password used by Supabase components to connect to clones (must match DB user password in clones)
supabase_db_password: "superpassword"
# Supabase images
supabase_rest_image: "postgrest/postgrest:v13.0.4"
supabase_auth_image: "supabase/auth:v2.178.0"
supabase_studio_image: "supabase/studio:2025.08.04-sha-6e99ca6"
supabase_kong_image: "kong:2.8.1"
supabase_realtime_image: "supabase/realtime:v2.25.40"
supabase_storage_image: "supabase/storage-api:v1.26.2"
supabase_imgproxy_image: "darthsim/imgproxy:v3.18"
supabase_meta_image: "supabase/postgres-meta:v0.91.5"
supabase_functions_image: "supabase/edge-runtime:v1.68.3"

supabase_images:
  - "{{ supabase_rest_image }}"
  - "{{ supabase_auth_image }}"
  - "{{ supabase_studio_image }}"
  - "{{ supabase_kong_image }}"
  - "{{ supabase_realtime_image }}"
  - "{{ supabase_storage_image }}"
  - "{{ supabase_imgproxy_image }}"
  - "{{ supabase_meta_image }}"
  - "{{ supabase_functions_image }}"


supabase_jwt_secret: "your-super-secret-jwt-token-with-at-least-32-characters-long"
supabase_anon_key: ""  # Provide via env: SUPABASE_ANON_KEY or extra-vars
supabase_service_role_key: ""  # Provide via env: SUPABASE_SERVICE_ROLE_KEY or extra-vars
