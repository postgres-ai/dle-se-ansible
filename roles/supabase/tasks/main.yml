---

- name: Pull Supabase Docker images
  community.docker.docker_image:
    name: "{{ item }}"
    source: pull
  loop: "{{ supabase_images + [supabase_runner_image] }}"
  register: docker_image
  until: docker_image is success
  delay: 10
  retries: 3
  when:
    - supabase_images is defined
    - supabase_images | length > 0

- name: Create Supabase Runner network
  community.docker.docker_network:
    name: "{{ supabase_runner_network }}"
    driver: bridge
    driver_options:
      com.docker.network.driver.mtu: 1440
    enable_ipv6: false
    internal: false
    state: present

- name: Connect DBLab server container to Supabase network
  community.docker.docker_network:
    name: "{{ supabase_runner_network }}"
    connected:
      - "{{ dblab_engine_container_name }}"
    appends: true

- name: Create Supabase Runner config dir
  ansible.builtin.file:
    dest: "{{ supabase_runner_config_path }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"

## Auto-generate Supabase keys if missing, based on supabase_jwt_secret
- name: Generate Supabase anon key if missing
  ansible.builtin.command: >-
    python3 {{ role_path }}/files/gen_jwt.py '{{ supabase_jwt_secret }}' anon
  register: gen_anon_key
  changed_when: true
  when: supabase_anon_key is not defined or (supabase_anon_key | length == 0)

- name: Set fact supabase_anon_key
  ansible.builtin.set_fact:
    supabase_anon_key: "{{ gen_anon_key.stdout }}"
  when: gen_anon_key is defined

- name: Generate Supabase service_role key if missing
  ansible.builtin.command: >-
    python3 {{ role_path }}/files/gen_jwt.py '{{ supabase_jwt_secret }}' service_role
  register: gen_service_key
  changed_when: true
  when: supabase_service_role_key is not defined or (supabase_service_role_key | length == 0)

- name: Set fact supabase_service_role_key
  ansible.builtin.set_fact:
    supabase_service_role_key: "{{ gen_service_key.stdout }}"
  when: gen_service_key is defined

# if dle_config_file is defined, copy the server.yml file
- name: Copy Supabase env file to '{{ supabase_runner_env_file }}'
  ansible.builtin.copy:
    dest: "{{ supabase_runner_env_file }}"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0600"
    content: |
      SUPABASE_ANON_KEY={{ supabase_anon_key }}
      SUPABASE_SERVICE_KEY={{ supabase_service_role_key }}
      JWT_SECRET={{ supabase_jwt_secret }}
      # Additional variables can be added here when wiring more services

- name: Run Supabase Runner container
  community.docker.docker_container:
    name: dblab_supabase_runner
    image: "{{ supabase_runner_image }}"
    state: started
    restart_policy: unless-stopped
    user: root
    ports:
      - "{{ supabase_runner_port }}:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "{{ supabase_runner_config_path }}:{{ supabase_runner_config_path }}"
    networks:
      - name: "{{ supabase_runner_network }}"
    detach: true
    env_file: "{{ supabase_runner_env_file }}"
    env:
      DOCKER_API_VERSION: "1.39"
      SECRET_TOKEN: "{{ supabase_runner_token }}"
      NETWORK_NAME: "{{ supabase_runner_network }}"
      SUPABASE_CONFIG_HOST_DIR: "{{ supabase_runner_config_path }}"
      DB_PASSWORD: "{{ supabase_db_password }}"
      JWT_SECRET: "{{ supabase_jwt_secret }}"
      POSTGREST_IMAGE: "{{ supabase_rest_image }}"
      GOTRUE_IMAGE: "{{ supabase_auth_image }}"
      STUDIO_IMAGE: "{{ supabase_studio_image }}"
      KONG_IMAGE: "{{ supabase_kong_image }}"
      REALTIME_IMAGE: "{{ supabase_realtime_image }}"
      STORAGE_IMAGE: "{{ supabase_storage_image }}"
      POSTGRES_META_IMAGE: "{{ supabase_meta_image }}"
      EDGE_FUNCTIONS_IMAGE: "{{ supabase_functions_image }}"

- name: Wait for Supabase Runner to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ supabase_runner_port }}"
    delay: 10
    timeout: 60
